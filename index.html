<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mafra Academia</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0B0B0B;
  color:white;
}

/* HERO */
.hero {
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1558611848-73f7eb4001ab') center/cover;
}

.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

.hero-content {
  position:relative;
  z-index:2;
}

/* LOGO CORRIGIDA */
.logo {
  width:130px;
  margin-bottom:25px;
  display:block;
  margin-left:auto;
  margin-right:auto;
  filter: drop-shadow(0 0 12px rgba(255,212,0,0.6));
}

/* TEXTOS */
h1 {
  font-size:36px;
  letter-spacing:1px;
}

.highlight {
  color:#FFD400;
}

.price {
  font-size:28px;
  margin:20px 0;
  font-weight:bold;
}

/* BOTÃO */
.cta {
  background:#FFD400;
  color:black;
  padding:18px 35px;
  font-size:18px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 20px #FFD400;
  transition:0.3s;
}

.cta:hover {
  transform:scale(1.05);
}

/* SEÇÕES */
.section {
  padding:60px 20px;
  text-align:center;
}

.section h2 {
  color:#FFD400;
}

.benefits {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card {
  background:#1a1a1a;
  padding:25px;
  border-radius:12px;
  border:1px solid #FFD400;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-8px);
}

/* URGÊNCIA */
.urgency {
  background:#FFD400;
  color:black;
  text-align:center;
  padding:12px;
  font-weight:bold;
}

/* WHATSAPP FIXO */
.fixed-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#FFD400;
  color:black;
  padding:15px 20px;
  border-radius:50px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 15px #FFD400;
}

</style>
</head>

<body>

<div class="urgency">
🔥 PROMOÇÃO POR TEMPO LIMITADO
</div>

<section class="hero">
  <div class="hero-content">

    <!-- IMPORTANTE: nome correto da imagem -->
    <img src="logo.png" class="logo" alt="Mafra Academia">

    <h1>
      Chega de promessas.<br>
      <span class="highlight">Comece a ver resultado de verdade</span>
    </h1>

    <p>Treinos completos + estrutura profissional</p>

    <div class="price">
      Planos a partir de R$ 89,90
    </div>

    <button class="cta" onclick="redirect()">
      Quero começar agora
    </button>

  </div>
</section>

<section class="section">
  <h2>Por que escolher a Mafra?</h2>

  <div class="benefits">
    <div class="card">🏋️ Equipamentos modernos</div>
    <div class="card">💪 Treinos para todos níveis</div>
    <div class="card">🔥 Resultados reais</div>
    <div class="card">📍 Localização acessível</div>
  </div>
</section>

<div class="fixed-btn" onclick="redirect()">
💬 WhatsApp
</div>

<script>
function redirect(){
  window.location.href =
  "https://wa.me/5548996389625?text=Quero%20começar%20na%20Mafra%20Academia";
}
</script>

</body>
</html>
